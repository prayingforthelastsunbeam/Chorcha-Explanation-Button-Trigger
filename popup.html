<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chorcha Button Trigger</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        background: #ffffff;
        color: #111827;
        width: 300px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 17px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 14px;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #triggerButton {
        background: #0f766e;
        color: #ffffff;
        margin-bottom: 10px;
      }
      #exportButton {
        background: #2563eb;
        color: #ffffff;
        margin-bottom: 14px;
      }
      #status {
        font-size: 13px;
        line-height: 1.4;
        color: #374151;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Chorcha Button Trigger</h1>
    <button id="triggerButton">Trigger ব্যাখ্যা buttons</button>
    <button id="exportButton">Save page as PDF</button>
    <div id="status">Open a page and click a button.</div>
    <script src="popup.js"></script>
  </body>
</html>
